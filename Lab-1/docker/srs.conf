# SRS configuration for WebRTC screen streaming (WHIP publish / WHEP play)
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    crossdomain     on;
}

# WebRTC transport (UDP). CANDIDATE must be the IP the clients can reach
# (LAN IP for testing, public IP for internet). Injected via env in compose.
rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {
    rtc {
        enabled     on;
        # NOTE: SRS WebRTC publish requires an H.264 video track. Real Android
        # devices provide a hardware H.264 encoder, so the WHIP offer includes it
        # and this works. The Android EMULATOR has no WebRTC-usable H.264 encoder
        # (it only offers VP8/VP9/AV1) and will be rejected — test on a real phone.
        # With H.264, these bridges also expose the stream as RTMP/FLV/HLS.
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}
